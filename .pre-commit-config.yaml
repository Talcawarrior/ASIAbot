repos:
  - repo: local
    hooks:
      - id: check-critical-files
        name: Check critical files not deleted
        entry: python .pre-commit-hooks/check_critical_files.py
        language: system
        always_run: true
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--config-file=mypy.ini, --exclude=scripts/, --exclude=skills/]
        exclude: ^(scripts/|skills/)
        additional_dependencies: [types-requests, types-python-dateutil, sqlalchemy2-stubs]
