[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["asi_engine", "engine", "executor", "scrapers", "data_pipeline", "utils", "config", "database"]
omit = [
    "tests/*",
    "scripts/*",
    "htmlcov/*",
    ".git/*",
    "node_modules/*",
    "__pycache__/*",
    "asi_engine/_sandbox_runner.py",
    "asi_engine/llm_loop_orchestrator.py",
]

[tool.coverage.report]
show_missing = true
fail_under = 50
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
    "pass",
    "except ImportError",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
ignore_missing_imports = true
python_version = "3.12"

[tool.bandit]
exclude_dirs = ["tests", "scripts", "htmlcov", ".git", "node_modules", "__pycache__"]
skips = ["B101"]
